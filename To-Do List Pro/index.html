<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
                    
   

    <div class="app">
        <h1>Mi To-Do List</h1>

        <div class="input-container">
            <input type="text" id="task-input" placeholder="¿Qué tienes pendiente?">
            <input type="date" id="task-date">
            <button id="add-btn">Agregar Tarea</button>
        </div>

        <p id="counter">Pendientes: 0</p>
        
        <div class="filters">
            <button data-filter="all">Todas</button>
            <button data-filter="pending">Pendientes</button>
            <button data-filter="completed">Hechas</button>
        </div>

        <ul id="task-list"></ul>

        <button id="clear-all">Borrar todo el historial</button>
    </div>

    <script src="script.js"></script>
    <footer>
    <p>&#174; Patric Aguilera</p>
    </footer>

    
</body>
</html>
